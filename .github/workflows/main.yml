name: Update My Progress Graph

on:
  push:
    branches: [ main ]
    paths:
      - '**/exercicio-concluido.md' # Só roda se você marcar um exercício como feito

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Scan and Update
        run: node scanner.js

      - name: Commit and Push
        run: |
          git config --global user.name 'Miriã Bot'
          git config --global user.email 'miria@users.noreply.github.com'
          git add README.md
          git commit -m "docs: 📈 atualizando gráfico de progresso [skip ci]" || echo "Sem mudanças"
          git push